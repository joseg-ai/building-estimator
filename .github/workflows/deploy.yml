name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install webapp dependencies
        working-directory: webapp
        run: npm ci

      - name: Build React app (prod — same-origin /api)
        working-directory: webapp
        env:
          VITE_API_URL: ''
        run: npx vite build

      - name: Install server production dependencies
        working-directory: server
        run: npm ci --omit=dev

      - name: Assemble deployment artifact
        run: |
          mkdir -p deploy/server
          mkdir -p deploy/webapp/dist
          # Copy server source (excluding dev node_modules, test, db files)
          cp server/index.js deploy/server/
          cp server/auth.js deploy/server/
          cp server/db.js deploy/server/
          cp server/routes-auth.js deploy/server/
          cp server/routes-quotes.js deploy/server/
          cp server/routes-pricelist.js deploy/server/
          cp server/routes-catalog.js deploy/server/
          cp server/routes-customers.js deploy/server/
          cp server/routes-vendors.js deploy/server/
          cp server/package.json deploy/server/
          cp server/package-lock.json deploy/server/
          cp -r server/node_modules deploy/server/
          # Copy built webapp
          cp -r webapp/dist/. deploy/webapp/dist/
          # Create zip
          cd deploy
          zip -r ../vmbc-estimator.zip .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'vmbc-estimator'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
          package: vmbc-estimator.zip
