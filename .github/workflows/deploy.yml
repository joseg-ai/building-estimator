name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install webapp dependencies
        working-directory: webapp
        run: npm ci

      - name: Build React app (prod — same-origin /api)
        working-directory: webapp
        env:
          VITE_API_URL: ''
        run: npx vite build

      - name: Install server production dependencies
        working-directory: server
        run: npm ci --omit=dev

      - name: Assemble deployment artifact
        run: |
          mkdir -p deploy/webapp/dist
          # Copy entire server directory (JS files + node_modules), excluding dev/local artifacts
          rsync -av --exclude='*.db' --exclude='*.db-shm' --exclude='*.db-wal' \
            --exclude='test/' --exclude='.env*' \
            server/ deploy/server/
          # Copy built webapp
          cp -r webapp/dist/. deploy/webapp/dist/
          # Create zip
          cd deploy
          zip -r ../vmbc-estimator.zip .

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        run: |
          az webapp deploy --name vmbc-estimator \
            --resource-group rg-vmbc-estimator \
            --src-path vmbc-estimator.zip \
            --type zip \
            --async false
