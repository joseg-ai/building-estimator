name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22 (for Vite webapp build)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install webapp dependencies
        working-directory: webapp
        run: npm ci

      - name: Build React app (prod — same-origin /api)
        working-directory: webapp
        env:
          VITE_API_URL: ''
        run: npx vite build

      - name: Install server production dependencies
        working-directory: server
        run: npm ci --omit=dev

      - name: Assemble deployment artifact
        run: |
          mkdir -p deploy/server
          mkdir -p deploy/webapp/dist
          # Copy server source + node_modules (compiled on ubuntu-22.04 glibc 2.35 — compat with Azure glibc 2.36)
          rsync -av --exclude='*.db' --exclude='*.db-shm' --exclude='*.db-wal' \
            --exclude='test/' --exclude='.env*' \
            server/ deploy/server/
          # Copy built webapp
          cp -r webapp/dist/. deploy/webapp/dist/
          # Report artifact size
          du -sh deploy/
          # Create zip
          cd deploy
          zip -r ../vmbc-estimator.zip .
          ls -lh ../vmbc-estimator.zip

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        run: |
          # az webapp deploy can time out on the client side while deploy is still in progress
          # Use || true so the workflow doesn't fail on timeout; we verify liveness below
          az webapp deploy \
            --resource-group rg-vmbc-estimator \
            --name vmbc-estimator \
            --src-path vmbc-estimator.zip \
            --type zip \
            --async true \
            --timeout 600 || true

      - name: Verify app is live
        run: |
          echo "Waiting for app to start (up to 5 min)..."
          for i in $(seq 1 30); do
            sleep 10
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
              https://vmbc-estimator.azurewebsites.net/api/health)
            echo "Poll $i: HTTP $HTTP"
            if [ "$HTTP" = "200" ]; then
              echo "App is live!"
              curl -s https://vmbc-estimator.azurewebsites.net/api/health
              exit 0
            fi
          done
          echo "App did not respond in time"
          exit 1


