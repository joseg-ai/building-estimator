name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22 (for Vite webapp build)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install webapp dependencies
        working-directory: webapp
        run: npm ci

      - name: Build React app (prod — same-origin /api)
        working-directory: webapp
        env:
          VITE_API_URL: ''
        run: npx vite build

      - name: Install server production dependencies
        working-directory: server
        run: npm ci --omit=dev

      - name: Assemble deployment artifact
        run: |
          mkdir -p deploy/server
          mkdir -p deploy/webapp/dist
          # Copy server source + node_modules (compiled on ubuntu-22.04 glibc 2.35 — compat with Azure glibc 2.36)
          rsync -av --exclude='*.db' --exclude='*.db-shm' --exclude='*.db-wal' \
            --exclude='test/' --exclude='.env*' \
            server/ deploy/server/
          # Copy built webapp
          cp -r webapp/dist/. deploy/webapp/dist/
          # Report artifact size
          du -sh deploy/
          # Create zip
          cd deploy
          zip -r ../vmbc-estimator.zip .
          ls -lh ../vmbc-estimator.zip

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        run: |
          az webapp deploy \
            --resource-group rg-vmbc-estimator \
            --name vmbc-estimator \
            --src-path vmbc-estimator.zip \
            --type zip \
            --async true \
            --timeout 600


