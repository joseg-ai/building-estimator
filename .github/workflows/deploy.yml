name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install webapp dependencies
        working-directory: webapp
        run: npm ci

      - name: Build React app (prod — same-origin /api)
        working-directory: webapp
        env:
          VITE_API_URL: ''
        run: npx vite build

      - name: Assemble deployment artifact
        run: |
          mkdir -p deploy/server
          mkdir -p deploy/webapp/dist
          # Copy server source + package manifests only (NO node_modules — Oryx rebuilds on Azure)
          rsync -av --exclude='*.db' --exclude='*.db-shm' --exclude='*.db-wal' \
            --exclude='test/' --exclude='.env*' --exclude='node_modules/' \
            server/ deploy/server/
          # Copy built webapp
          cp -r webapp/dist/. deploy/webapp/dist/
          # Root package.json tells Oryx the startup entry point
          cat > deploy/package.json << 'EOF'
          {
            "name": "vmbc-estimator",
            "version": "1.0.0",
            "scripts": {
              "start": "node server/index.js"
            }
          }
          EOF
          # Create zip
          cd deploy
          zip -r ../vmbc-estimator.zip .

      - name: Deploy to Azure Web App via Kudu ZipDeploy
        env:
          KUDU_USER: ${{ secrets.KUDU_USERNAME }}
          KUDU_PASS: ${{ secrets.KUDU_PASSWORD }}
        run: |
          curl -X POST \
            "https://vmbc-estimator.scm.azurewebsites.net/api/zipdeploy" \
            -u "${KUDU_USER}:${KUDU_PASS}" \
            -H "Content-Type: application/zip" \
            --data-binary @vmbc-estimator.zip \
            --fail-with-body \
            -w "\nHTTP Status: %{http_code}\n"

