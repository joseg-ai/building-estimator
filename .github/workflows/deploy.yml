name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22 (for Vite webapp build)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install webapp dependencies
        working-directory: webapp
        run: npm ci

      - name: Build React app (prod — same-origin /api)
        working-directory: webapp
        env:
          VITE_API_URL: ''
        run: npx vite build

      - name: Install server production dependencies
        working-directory: server
        run: npm ci --omit=dev

      - name: Assemble deployment artifact
        run: |
          mkdir -p deploy/server
          mkdir -p deploy/webapp/dist
          # Copy server source + node_modules (compiled on ubuntu-22.04 glibc 2.35 — compat with Azure glibc 2.36)
          rsync -av --exclude='*.db' --exclude='*.db-shm' --exclude='*.db-wal' \
            --exclude='test/' --exclude='.env*' \
            server/ deploy/server/
          # Copy built webapp
          cp -r webapp/dist/. deploy/webapp/dist/
          # Create zip
          cd deploy
          zip -r ../vmbc-estimator.zip .

      - name: Deploy to Azure Web App via Kudu ZipDeploy
        env:
          KUDU_USER: ${{ secrets.KUDU_USERNAME }}
          KUDU_PASS: ${{ secrets.KUDU_PASSWORD }}
        run: |
          # Check zip size
          ls -lh vmbc-estimator.zip
          
          # Deploy asynchronously (avoids timeout on large zips)
          RESPONSE=$(curl -X POST \
            "https://vmbc-estimator.scm.azurewebsites.net/api/zipdeploy?isAsync=true" \
            -u "${KUDU_USER}:${KUDU_PASS}" \
            -H "Content-Type: application/zip" \
            --data-binary @vmbc-estimator.zip \
            --max-time 300 \
            -w "\n%{http_code}" \
            -s)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          echo "Deploy HTTP status: $HTTP_CODE"
          
          # 202 = accepted for async deploy
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "202" ]; then
            echo "Deploy failed with status $HTTP_CODE"
            echo "$RESPONSE"
            exit 1
          fi
          
          # Poll until deployment completes (max 5 minutes)
          echo "Polling deployment status..."
          for i in $(seq 1 30); do
            sleep 10
            STATUS=$(curl -s -u "${KUDU_USER}:${KUDU_PASS}" \
              "https://vmbc-estimator.scm.azurewebsites.net/api/deployments/latest" | \
              python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status',0), d.get('complete',False))")
            echo "Poll $i: $STATUS"
            COMPLETE=$(echo "$STATUS" | awk '{print $2}')
            DEPLOY_STATUS=$(echo "$STATUS" | awk '{print $1}')
            if [ "$COMPLETE" = "True" ]; then
              if [ "$DEPLOY_STATUS" = "4" ]; then
                echo "Deployment succeeded!"
                exit 0
              else
                echo "Deployment failed with status $DEPLOY_STATUS"
                exit 1
              fi
            fi
          done
          echo "Deployment polling timed out"
          exit 1


